name: NPM Publish

on:
  release:
    types: [ published ]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Verify package-lock.json exists
        run: |
          if [ ! -f "package-lock.json" ]; then
            echo "Error: package-lock.json not found. Please run 'npm install' and commit package-lock.json"
            exit 1
          fi
          echo "package-lock.json found"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Extract version from tag
        id: tag_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify version matches package.json
        run: |
          TAG_VERSION="${{ steps.tag_version.outputs.VERSION }}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi
          echo "Version match confirmed: $TAG_VERSION"

      - name: Publish to NPM
        run: npm publish --provenance --access public

      - name: Verify NPM publication
        run: |
          TAG_VERSION="${{ steps.tag_version.outputs.VERSION }}"
          sleep 5
          npm view @ncovercash/homebridge-wled-presets@${TAG_VERSION} version || exit 1
          echo "Successfully published version ${TAG_VERSION} to NPM"
