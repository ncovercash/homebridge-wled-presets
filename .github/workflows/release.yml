name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify package-lock.json exists
        run: |
          if [ ! -f "package-lock.json" ]; then
            echo "Error: package-lock.json not found. Please run 'npm install' and commit package-lock.json"
            exit 1
          fi
          echo "package-lock.json found"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Extract version from tag
        id: tag_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release_notes
        run: |
          TAG_VERSION="${{ steps.tag_version.outputs.VERSION }}"
          NOTES="## What's New in v${TAG_VERSION}
          
          ### Installation
          \`\`\`bash
          npm install -g homebridge-simple-wled@${TAG_VERSION}
          \`\`\`
          
          ### Changes
          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/v${TAG_VERSION}/CHANGELOG.md) for detailed changes.
          
          ### Full Changelog
          https://github.com/${{ github.repository }}/compare/v${{ github.event.before }}...v${TAG_VERSION}"
          
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ steps.tag_version.outputs.VERSION }}
          body: ${{ steps.release_notes.outputs.NOTES }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

